<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>4人麻雀 (東風荘・オンライン＆CPU対戦版)</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #000000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }

    #app-container {
      position: relative;
      width: 90vw;
      height: 90vw;
      max-width: 500px;
      max-height: 500px;
      aspect-ratio: 1 / 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      background: rgba(20, 20, 20, 0.95);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.8);
      width: 90%;
      max-width: 340px;
      z-index: 10;
      border: 1px solid #444;
      position: absolute;
    }
    
    h1, h2 { font-size: 1.1rem; margin-bottom: 10px; color: #ffd700; }
    input { width: 100%; padding: 8px; margin: 6px 0; background: #222; border: 1px solid #555; color: #fff; text-align: center; border-radius: 4px; }
    
    .btn { padding: 8px; font-size: 0.8rem; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 6px; }
    .btn-start { background-color: #e63946; color: #fff; }
    .btn-cpu { background-color: #2a9d8f; color: #fff; }

    /* 麻雀卓画面 */
    #game-screen {
      display: none; width: 100%; height: 100%; position: relative;
      background-color: #1f6036; overflow: hidden; border: 2px solid #10331c;
    }

    .header-bar {
      position: absolute; top: 4px; left: 4px; display: flex; gap: 4px; align-items: center;
      background: rgba(0, 0, 0, 0.6); padding: 2px 6px; border-radius: 4px; font-size: 0.55rem; z-index: 5;
    }
    #timer-display { color: #ffd700; font-weight: bold; margin-left: 4px; }

    .table-center {
      position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%);
      width: 115px; height: 90px; background: #154024; border: 1px solid #0d2817;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      border-radius: 4px; font-size: 0.5rem; padding: 1px; text-align: center; z-index: 2;
    }

    .dora-container { display: flex; gap: 1px; margin-top: 1px; }
    #game-status { margin-top: 2px; font-size: 0.5rem; color: #aaa; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .player-area { position: absolute; background: rgba(0, 0, 0, 0.4); padding: 2px; border-radius: 4px; font-size: 0.52rem; z-index: 3; }
    .player-bottom { bottom: 12px; left: 50%; transform: translateX(-50%); text-align: center; width: 98%; }
    .player-left   { left: 2px; top: 42%; transform: translateY(-50%); }
    .player-top    { top: 2px; left: 50%; transform: translateX(-50%); text-align: center; }
    .player-right  { right: 2px; top: 42%; transform: translateY(-50%); }

    .score-tag { color: #ffd700; font-weight: bold; margin-left: 2px; }
    .riichi-tag { color: #ff4d4d; font-weight: bold; margin-left: 2px; font-size: 0.48rem; }

    .action-area { display: flex; gap: 3px; justify-content: center; align-items: center; margin-bottom: 2px; min-height: 20px; }
    .btn-action { background-color: #ffd700; color: #000; font-weight: bold; padding: 2px 6px; font-size: 0.6rem; border: none; border-radius: 2px; cursor: pointer; }
    
    .hand-container { display: flex; gap: 1px; margin-top: 1px; justify-content: center; align-items: flex-end; width: 100%; }
    .tile-group { display: flex; gap: 1px; }
    .fulo-container { display: flex; gap: 1px; margin-left: 2px; border-left: 1px dashed #aaa; padding-left: 2px; }

    .tile {
      width: 18px; height: 26px; background: #fff; border: 1px solid #888; border-radius: 2px;
      display: flex; justify-content: center; align-items: center; font-weight: bold;
      font-size: 0.55rem; color: #222; flex-shrink: 0; user-select: none; cursor: pointer;
    }
    .tile.drawn-tile { margin-left: 3px; }
    .tile.fulo-tile { width: 13px; height: 18px; font-size: 0.42rem; background-color: #f0f0f0; }
    .tile.horizontal { transform: rotate(90deg); margin: 0 1px; }
    .tile.man { color: #b22222; } .tile.pin { color: #0055b3; } .tile.sou { color: #008000; } .tile.ji { color: #222; }
    .tile.aka { color: #ff0000 !important; background-color: #fff0f0; }

    .river { display: flex; flex-wrap: wrap; gap: 1px; width: 72px; margin-top: 1px; min-height: 15px; align-items: center; }
    .river .tile { width: 11px; height: 15px; font-size: 0.35rem; cursor: default; }
    .dora-container .tile { width: 12px; height: 17px; font-size: 0.4rem; }
  </style>
</head>
<body>

  <div id="app-container">
    <!-- メニュー画面 -->
    <div id="menu-screen" class="screen">
      <h1>東風荘 オンライン対戦</h1>
      <input type="text" id="player-name-input" placeholder="プレイヤー名" value="名無し">
      <input type="text" id="room-id-input" placeholder="部屋番号を入力 (例: 777)">
      <button class="btn btn-start" onclick="joinRoom()">部屋に入る</button>
    </div>

    <!-- 待機ルーム画面 -->
    <div id="waiting-screen" class="screen" style="display: none;">
      <h2>マッチング待機中</h2>
      <div style="font-size: 0.8rem; margin: 10px 0;">部屋番号: <span id="display-room-id" style="color:#ffd700;"></span></div>
      <div style="font-size: 0.8rem;">参加人数: <span id="player-count">1</span> / 4 人</div>
      <div id="player-list" style="font-size: 0.75rem; color: #aaa; margin: 10px 0; text-align: left; padding-left: 20px;"></div>
      
      <button class="btn btn-cpu" onclick="startWithCpu()">不足メンバーをCPUにして開始</button>
    </div>

    <!-- 麻雀卓画面 -->
    <div id="game-screen">
      <div class="header-bar">
        <div>東風戦</div>
        <div>持ち時間:<span id="timer-display">60</span>秒</div>
      </div>
      <div class="table-center">
        <div>残牌: <span id="deck-count">0</span></div>
        <div style="margin-top:1px; color:#ffd700; font-weight:bold;" id="round-info">東1局</div>
        <div style="font-size:0.42rem; color:#ff4d4d;">立直棒: <span id="kyotaku-count">0</span>本</div>
        <div style="font-size:0.42rem; color:#ccc;">ドラ表示牌</div>
        <div class="dora-container" id="dora-display"></div>
        <div id="game-status">対局開始</div>
      </div>

      <div class="player-area player-top"><span id="name-2">対面</span><span class="score-tag" id="score-2">25000</span><span id="riichi-2" class="riichi-tag"></span><div class="river" id="river-2" style="margin: 1px auto;"></div></div>
      <div class="player-area player-left"><span id="name-3">上家</span><br><span class="score-tag" id="score-3">25000</span><span id="riichi-3" class="riichi-tag"></span><div class="river" id="river-3"></div></div>
      <div class="player-area player-right"><span id="name-1">下家</span><br><span class="score-tag" id="score-1">25000</span><span id="riichi-1" class="riichi-tag"></span><div class="river" id="river-1"></div></div>

      <div class="player-area player-bottom">
        <div class="action-area" id="action-area"></div>
        <div><span id="name-0">あなた</span><span class="score-tag" id="score-0">25000</span><span id="riichi-0" class="riichi-tag"></span></div>
        <div class="river" id="river-0" style="margin: 1px auto;"></div>
        <div class="hand-container">
          <div id="player-hand" style="display:flex; gap:1px; align-items:flex-end;"></div>
          <div class="fulo-container" id="player-fulo"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    let mySeat = -1;
    let myRoomId = '';
    let roomPlayers = [];

    // --- オンライン通信イベント ---
    function joinRoom() {
      const name = document.getElementById('player-name-input').value.trim();
      const roomId = document.getElementById('room-id-input').value.trim();
      if (!roomId) return alert('部屋番号を入力してください');

      myRoomId = roomId;
      socket.emit('joinRoom', { roomId, playerName: name });

      document.getElementById('menu-screen').style.display = 'none';
      document.getElementById('waiting-screen').style.display = 'block';
      document.getElementById('display-room-id').textContent = roomId;
    }

    function startWithCpu() {
      socket.emit('startWithCpu', { roomId: myRoomId });
    }

    socket.on('assignedSeat', (data) => { mySeat = data.seat; });

    socket.on('roomUpdate', (data) => {
      document.getElementById('player-count').textContent = data.playerCount;
      document.getElementById('player-list').innerHTML = data.players.map(p => `<div>・ ${p.name}</div>`).join('');
    });

    socket.on('roomFull', () => {
      alert('部屋が満員です');
      location.reload();
    });

    socket.on('timerUpdate', (data) => {
      document.getElementById('timer-display').textContent = data.timeLeft;
    });

    socket.on('timeOut', (data) => {
      if (data.turn === mySeat && currentTurn === 0) {
        // 自分の手番で時間切れの場合、自動でツモ切りを行う
        discardTile(hands[0].length - 1);
      }
    });

    socket.on('gameStart', (data) => {
      roomPlayers = data.players;
      document.getElementById('waiting-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'block';
      
      // プレイヤー名の表示設定（自分の視点に座順を合わせる）
      for (let i = 0; i < 4; i++) {
        const actualSeat = (mySeat + i) % 4;
        const pInfo = roomPlayers.find(p => p.seat === actualSeat);
        document.getElementById(`name-${i}`).textContent = pInfo ? pInfo.name : `CPU${i}`;
      }
      
      startGame();
    });

    // --- 麻雀ゲーム本体ロジック (提供コードの流用・通信統合) ---
    const ALL_TILES_LIST = [
      { type: 'man', label: '1萬', val: 1 }, { type: 'man', label: '2萬', val: 2 }, { type: 'man', label: '3萬', val: 3 },
      { type: 'man', label: '4萬', val: 4 }, { type: 'man', label: '5萬', val: 5 }, { type: 'man', label: '6萬', val: 6 },
      { type: 'man', label: '7萬', val: 7 }, { type: 'man', label: '8萬', val: 8 }, { type: 'man', label: '9萬', val: 9 },
      { type: 'pin', label: '1筒', val: 11 }, { type: 'pin', label: '2筒', val: 12 }, { type: 'pin', label: '3筒', val: 13 },
      { type: 'pin', label: '4筒', val: 14 }, { type: 'pin', label: '5筒', val: 15 }, { type: 'pin', label: '6筒', val: 16 },
      { type: 'pin', label: '7筒', val: 17 }, { type: 'pin', label: '8筒', val: 18 }, { type: 'pin', label: '9筒', val: 19 },
      { type: 'sou', label: '1索', val: 21 }, { type: 'sou', label: '2索', val: 22 }, { type: 'sou', label: '3索', val: 23 },
      { type: 'sou', label: '4索', val: 24 }, { type: 'sou', label: '5索', val: 25 }, { type: 'sou', label: '6索', val: 26 },
      { type: 'sou', label: '7索', val: 27 }, { type: 'sou', label: '8索', val: 28 }, { type: 'sou', label: '9索', val: 29 },
      { type: 'ji', label: '東', val: 31 }, { type: 'ji', label: '南', val: 32 }, { type: 'ji', label: '西', val: 33 }, { type: 'ji', label: '北', val: 34 },
      { type: 'ji', label: '白', val: 35 }, { type: 'ji', label: '發', val: 36 }, { type: 'ji', label: '中', val: 37 }
    ];

    let deck = [], wanpai = [], doraIndicators = [];
    let hands = [[], [], [], []], fulos = [[], [], [], []], rivers = [[], [], [], []];
    let scores = [25000, 25000, 25000, 25000];
    let kyotakuRiichi = 0, oya = 0, currentTurn = 0, currentKyoku = 1;
    let isRiichi = [false, false, false, false];

    function createDeck() {
      deck = []; let id = 0;
      ALL_TILES_LIST.forEach(t => {
        for (let i = 0; i < 4; i++) deck.push({ ...t, id: id++, isAka: ((t.val === 5 || t.val === 15 || t.val === 25) && i === 0) });
      });
      for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
      }
      wanpai = deck.splice(0, 14);
      doraIndicators = [wanpai[0]];
    }

    function startGame() {
      scores = [25000, 25000, 25000, 25000];
      oya = 0;
      startRound();
    }

    function startRound() {
      createDeck();
      hands = [[], [], [], []]; fulos = [[], [], [], []]; rivers = [[], [], [], []];
      isRiichi = [false, false, false, false]; currentTurn = oya;

      for (let i = 0; i < 13; i++) {
        for (let p = 0; p < 4; p++) hands[p].push(deck.pop());
      }
      hands[oya].push(deck.pop());
      sortHand(hands[0]);
      updateUI();
    }

    function sortHand(hand) { hand.sort((a, b) => a.val - b.val); }

    function discardTile(index) {
      if (currentTurn !== 0) return;
      const tile = hands[0].splice(index, 1)[0];
      rivers[0].push(tile);
      sortHand(hands[0]);
      updateUI();

      // 他プレイヤーへ行動を送信
      socket.emit('playerAction', {
        roomId: myRoomId,
        actionData: { type: 'discard', seat: mySeat, tile: tile, nextTurn: (mySeat + 1) % 4 }
      });
    }

    function createTileElement(tile, extraClass = '') {
      const tileDiv = document.createElement('div');
      tileDiv.className = `tile ${tile.type} ${tile.isAka ? 'aka' : ''} ${extraClass}`;
      tileDiv.textContent = tile.label; return tileDiv;
    }

    function updateUI() {
      document.getElementById('deck-count').textContent = deck.length;
      document.getElementById('kyotaku-count').textContent = kyotakuRiichi;
      for (let i = 0; i < 4; i++) document.getElementById(`score-${i}`).textContent = scores[i];
      
      const doraContainer = document.getElementById('dora-display'); 
      doraContainer.innerHTML = '';
      doraIndicators.forEach(ind => doraContainer.appendChild(createTileElement(ind)));

      const container = document.getElementById('player-hand'); 
      container.innerHTML = '';
      hands[0].forEach((tile, index) => {
        const tileDiv = createTileElement(tile);
        tileDiv.onclick = () => discardTile(index);
        container.appendChild(tileDiv);
      });

      for (let p = 0; p < 4; p++) {
        const riverDiv = document.getElementById(`river-${p}`); 
        riverDiv.innerHTML = '';
        rivers[p].forEach(tile => riverDiv.appendChild(createTileElement(tile)));
      }
    }
  </script>
</body>
</html>
